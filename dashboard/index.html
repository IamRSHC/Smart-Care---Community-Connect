<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCare — NexaGen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0B1220;
    --panel: #131B2C;
    --line: #24304A;
    --text: #E7ECF5;
    --text-muted: #8792A8;
    --text-dim: #5C6883;
    --green: #2FB380;
    --red: #EF4444;
    --font-hero: "Chakra Petch", sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  html[data-theme="light"] {
    --ink: #F1F3F7;
    --panel: #FFFFFF;
    --line: #DDE3ED;
    --text: #131B2C;
    --text-muted: #5B657A;
    --text-dim: #93A0B7;
    --green: #17915E;
    --red: #DC2626;
  }
  * { box-sizing: border-box; }
  html { color-scheme: dark; }
  html[data-theme="light"] { color-scheme: light; }
  html, body {
    margin: 0; height: 100%;
    background: var(--ink);
    color: var(--text);
    overflow: hidden;
    transition: background 0.2s ease, color 0.2s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  .stage {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .theme-toggle {
    position: absolute;
    top: 24px; right: 24px;
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 5;
    transition: all 0.15s ease;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--green); }
  .theme-toggle svg { width: 16px; height: 16px; }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    opacity: 0;
    animation: rise 0.6s ease forwards;
    animation-delay: 0.15s;
    margin-bottom: 18px;
  }

  .title {
    font-family: var(--font-hero);
    font-weight: 700;
    font-size: clamp(48px, 11vw, 108px);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 0;
    display: flex;
    position: relative;
    z-index: 2;
  }
  .title span {
    display: inline-block;
    opacity: 0;
    transform: translateY(28px);
    animation: rise 0.55s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
  .title .accent { color: var(--green); }

  .tagline {
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 22px;
    opacity: 0;
    animation: rise 0.6s ease forwards;
    animation-delay: 1.5s;
  }

  /* ECG line runs behind the title full-bleed, like a monitor backdrop -
     title sits above it via z-index so the line passes through letter gaps */
  .ecg-wrap {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 160px;
    overflow: hidden;
    opacity: 0.18;
    z-index: 1;
    pointer-events: none;
  }
  .ecg-wrap svg {
    display: block;
    width: 200%;
    height: 100%;
    overflow: visible;
    animation: ecg-drift 9s linear infinite;
  }
  @keyframes ecg-drift {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .ecg-line { stroke: var(--green); }

  .eyebrow, .tagline, .prompt { position: relative; z-index: 2; }

  .prompt {
    position: absolute;
    bottom: 64px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    opacity: 0;
    animation: rise 0.6s ease forwards, blink 1.6s ease-in-out 2.6s infinite;
    animation-delay: 2.2s, 2.6s;
    cursor: pointer;
    border: 1px solid var(--line);
    padding: 10px 22px;
    border-radius: 999px;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .prompt:hover { border-color: var(--green); color: var(--text); }
  @keyframes blink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .stage.leaving { animation: fade-out 0.5s ease forwards; }
  @keyframes fade-out {
    to { opacity: 0; transform: scale(1.02); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle light / dark theme">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
  </button>

  <div class="ecg-wrap">
    <svg id="ecgSvg" viewBox="0 0 1800 160" preserveAspectRatio="none">
      <polyline id="ecgLine" class="ecg-line" fill="none" stroke-width="2" points=""/>
    </svg>
  </div>

  <div class="eyebrow">NexaGen Presents</div>
  <h1 class="title" id="title" aria-label="SmartCare"></h1>
  <div class="tagline">Resident Health &amp; Activity Monitoring</div>

  <div class="prompt" id="prompt" role="button" tabindex="0">Press Enter to Continue</div>
</div>

<script>
const word = "SmartCare";
const accentFrom = 5;
const titleEl = document.getElementById("title");
word.split("").forEach((ch, i) => {
  const span = document.createElement("span");
  span.textContent = ch;
  span.style.animationDelay = `${0.35 + i * 0.045}s`;
  if (i >= accentFrom) span.classList.add("accent");
  titleEl.appendChild(span);
});

// Build one repeating beat unit and tile it exactly across the doubled-width
// SVG (1280 = 2x the 640 viewBox band width). Because the pattern repeats on
// an exact divisor of the total width, shifting the SVG by -50% via the
// ecg-drift animation lines the pattern up perfectly with itself - the loop
// never visibly restarts or "runs out," it just keeps scrolling.
function buildEcgPoints(totalWidth, unitWidth) {
  const baseline = 80;
  const pts = [];
  for (let x = 0; x <= totalWidth; x += unitWidth) {
    pts.push([x, baseline]);
    pts.push([x + unitWidth * 0.40, baseline]);
    pts.push([x + unitWidth * 0.46, baseline - 45]);
    pts.push([x + unitWidth * 0.52, baseline + 50]);
    pts.push([x + unitWidth * 0.58, baseline]);
  }
  return pts.map(p => p.join(",")).join(" ");
}
document.getElementById("ecgLine").setAttribute("points", buildEcgPoints(1800, 225));

const SUN = 'M12 4V2M12 22v-2M4.93 4.93 3.51 3.51M20.49 20.49l-1.42-1.42M4 12H2M22 12h-2M4.93 19.07l-1.42 1.42M20.49 3.51l-1.42 1.42M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z';
const MOON = 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z';
function applyThemeIcon() {
  const theme = document.documentElement.getAttribute("data-theme");
  document.getElementById("themeIcon").innerHTML = `<path d="${theme === 'dark' ? SUN : MOON}"/>`;
}
function initTheme() {
  const saved = localStorage.getItem("smartcare-theme");
  document.documentElement.setAttribute("data-theme", saved || "dark");
  applyThemeIcon();
}
document.getElementById("themeToggle").addEventListener("click", () => {
  const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("smartcare-theme", next);
  applyThemeIcon();
});
initTheme();

function proceed() {
  const stage = document.getElementById("stage");
  stage.classList.add("leaving");
  setTimeout(() => { window.location.href = "about.html"; }, 480);
}
document.getElementById("prompt").addEventListener("click", proceed);
window.addEventListener("keydown", (e) => { if (e.key === "Enter") proceed(); });
</script>

</body>
</html>
