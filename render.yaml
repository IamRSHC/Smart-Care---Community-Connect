databases:
  - name: smartcare-db
    plan: free
    databaseName: smartcare
    user: smartcare

services:
  - type: web
    name: smartcare-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: smartcare-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"        # replace with your Vercel URL once you have it, e.g. https://smartcare-dashboard.vercel.app
      - key: ANTHROPIC_API_KEY
        sync: false        # set this manually in the Render dashboard (Environment tab) - don't commit real keys to git
